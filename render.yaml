databases:
  - name: baymaxlit-db
    databaseName: baymaxlit
    user: baymaxlit

services:
  - type: web
    name: test-chatbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app
    autoDeploy: true
    envVars:
      - key: BAYMAX_WEB_SECRET
        generateValue: true
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_CONFIG_JSON
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: baymaxlit-db
          property: connectionString
      - key: GEMINI_MODEL
        value: models/gemini-2.5-flash-lite
      - key: FLASK_DEBUG
        value: "0"
      - key: STUDY_TIMER_CHUNK_SECONDS
        value: "1800"
      - key: STUDY_TIMER_COINS_PER_CHUNK
        value: "10"
